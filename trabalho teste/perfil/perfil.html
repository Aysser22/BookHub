<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookHub - Meu Perfil</title>
    <link rel="stylesheet" href="./perfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <i class="fa-solid fa-book-open"></i> <span>BookHub</span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="../pagina-inicial/inicial.html">Catálogo</a></li>
                <li><a href="./perfil.html" class="active">Meu Perfil</a></li>
                <li><a href="../parte-de-administrador/admin.html">Painel Admin</a></li>
                <li><a href="../login/login.html" class="btn-login">Entrar</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="profile-header">
            <div class="profile-info">
                <div class="profile-avatar">
                    <i class="fa-solid fa-user-graduate"></i>
                </div>
                <div class="profile-details">
                    <h1 id="nomeUsuario">Carregando...</h1>
                    <p id="infoUsuario">Carregando...</p>
                    <p class="registration" id="matriculaUsuario">Carregando...</p>
                </div>
            </div>
            <div class="profile-stats">
                <div class="stat-card">
                    <span class="stat-number" id="estatLidos">0</span>
                    <span class="stat-label">Lidos</span>
                </div>
                <div class="stat-card highlight">
                    <span class="stat-number" id="estatEmprestados">0</span>
                    <span class="stat-label">Emprestados</span>
                </div>
                <div class="stat-card warning">
                    <span class="stat-number" id="estatAtrasos">0</span>
                    <span class="stat-label">Atrasos</span>
                </div>
            </div>
        </section>

        <section class="history-section">
            <div class="section-header">
                <h2><i class="fa-solid fa-clock-rotate-left"></i> Histórico de Empréstimos</h2>
                <div class="filters">
                    <button class="filter-btn active">Todos</button>
                    <button class="filter-btn">Ativos</button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Livro</th>
                            <th>Data</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="historicoEmprestimos">
                        <tr>
                            <td colspan="3">Nenhum empréstimo registrado ainda.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    

    <script src="./perfil.js"></script>
</body>
</html>
